<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central do CFO - Autenticação</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-login">

  <div class="glass-card p-8 rounded-3xl max-w-md w-full space-y-6 shadow-2xl border border-amber-500/20">
    <div class="text-center space-y-3">
      <img src="/assets/images/logo-cfo.png" alt="Logo CFO" class="w-24 h-24 mx-auto drop-shadow-lg">
      <h1 class="text-2xl font-extrabold text-amber-400 tracking-wider">CENTRAL DO CFO</h1>
      <p class="text-xs text-gray-400">Insira suas credenciais para acessar o portal</p>
    </div>

    <form onsubmit="login(event)" class="space-y-4">
      <div>
        <label class="text-xs font-semibold text-gray-300">Usuário / Nick Policial</label>
        <div class="relative mt-1">
          <input type="text" id="user" required placeholder="Ex: gestor1" class="w-full bg-gray-950/80 border border-gray-800 rounded-xl p-3 pl-10 text-sm focus:border-amber-500 focus:outline-none">
          <i data-lucide="user" class="w-4 h-4 text-gray-500 absolute left-3 top-3.5"></i>
        </div>
      </div>

      <div>
        <label class="text-xs font-semibold text-gray-300">Senha</label>
        <div class="relative mt-1">
          <input type="password" id="pass" required placeholder="••••••••" class="w-full bg-gray-950/80 border border-gray-800 rounded-xl p-3 pl-10 text-sm focus:border-amber-500 focus:outline-none">
          <i data-lucide="lock" class="w-4 h-4 text-gray-500 absolute left-3 top-3.5"></i>
        </div>
      </div>

      <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-black font-extrabold rounded-xl text-sm shadow-lg shadow-amber-500/20 transition-all">
        ACESSAR SISTEMA
      </button>
    </form>
  </div>

  <script src="/assets/js/auth-guard.js"></script>
  <script>
    lucide.createIcons();

    // Se já estiver logado, redireciona para o painel correspondente
    const user = JSON.parse(sessionStorage.getItem('cfo_user'));
    if (user) redirecionarPorRole(user.role);

    async function login(e) {
      e.preventDefault();
      const usuario = document.getElementById('user').value;
      const senha = document.getElementById('pass').value;

      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, senha })
      });

      const data = await res.json();
      if (data.error) return alert(data.error);

      sessionStorage.setItem('cfo_user', JSON.stringify(data.user));
      redirecionarPorRole(data.user.role);
    }
  </script>
</body>
</html>
