<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central do CFO - Avaliadores</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/auth-guard.js"></script>
  <script>const currentUser = checkAuth('avaliador');</script>
</head>
<body class="min-h-screen flex flex-col justify-between">

  <header class="border-b border-gray-800 bg-gray-950/90 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <img src="/assets/images/logo-cfo.png" class="w-10 h-10" alt="Logo CFO">
        <div>
          <h1 class="font-extrabold text-base text-blue-400">PAINEL DE AVALIAÇÃO</h1>
          <p id="user-role-badge" class="text-[10px] text-gray-400 uppercase tracking-widest"></p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <span id="user-display-name" class="text-xs font-bold text-gray-300"></span>
        <button onclick="logout()" class="px-3 py-1.5 bg-rose-500/10 border border-rose-500/30 text-rose-400 hover:bg-rose-500/20 rounded-lg text-xs font-semibold">Sair</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6 flex-grow w-full space-y-6">
    <div class="rounded-2xl overflow-hidden border border-gray-800 shadow-xl">
      <img src="/assets/images/banner-cfo.png" alt="Banner CFO" class="w-full h-auto object-cover">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="glass-card p-6 rounded-2xl space-y-4">
        <h3 class="text-base font-bold text-blue-400">Emissão de Token</h3>
        <input type="text" id="cand-nick" placeholder="Nick do Policial Candidato" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-xs">
        <button onclick="gerarToken()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-xs">GERAR TOKEN EXCLUSIVO</button>
        <div id="out-token" class="hidden p-3 bg-blue-950/50 border border-blue-800 text-center rounded-xl font-mono text-sm text-blue-300"></div>
      </div>

      <div class="md:col-span-2 glass-card p-6 rounded-2xl space-y-4">
        <div class="flex justify-between items-center border-b border-gray-800 pb-2">
          <h3 class="text-base font-bold text-white">Provas Pendentes de Correção</h3>
          <button onclick="carregarProvasPendentes()" class="text-xs text-blue-400">Atualizar</button>
        </div>
        <div id="lista-pendentes" class="space-y-4"></div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    async function gerarToken() {
      const nickCandidato = document.getElementById('cand-nick').value;
      const res = await fetch('/api/avaliador?action=gerarToken', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickAvaliador: currentUser.nick, nickCandidato })
      });
      const data = await res.json();
      if (data.error) return alert(data.error);

      const out = document.getElementById('out-token');
      out.innerText = `TOKEN: ${data.token}`;
      out.classList.remove('hidden');
    }

    async function carregarProvasPendentes() {
      const res = await fetch('/api/avaliador?action=listarPendentes');
      const { provas, bancoQuestoes } = await res.json();

      document.getElementById('lista-pendentes').innerHTML = provas.map(p => {
        const resp = JSON.parse(p.respostas_json || '{}');
        return `
          <div class="bg-gray-950 p-4 rounded-xl border border-gray-800 space-y-3">
            <div class="flex justify-between text-xs font-bold"><span class="text-blue-400">Aluno: ${p.candidato_nick}</span><span>${p.token_utilizado}</span></div>
            ${bancoQuestoes.map(q => `
              <div class="p-2 bg-gray-900 rounded text-xs space-y-1">
                <p class="font-bold text-gray-300">${q.titulo}</p>
                <p class="text-emerald-400">Gabarito: ${q.gabarito_esperado}</p>
                <p class="text-amber-200">Resposta: ${resp[q.id] || 'Sem Resposta'}</p>
              </div>
            `).join('')}
            <div class="grid grid-cols-3 gap-2">
              <input type="number" id="nota-${p.id}" placeholder="Nota (0-10)" class="bg-gray-900 border border-gray-800 rounded p-2 text-xs">
              <input type="text" id="fb-${p.id}" placeholder="Feedback" class="col-span-2 bg-gray-900 border border-gray-800 rounded p-2 text-xs">
            </div>
            <button onclick="enviarCorrecao(${p.id})" class="w-full py-2 bg-emerald-600 font-bold rounded-lg text-xs">SALVAR</button>
          </div>
        `;
      }).join('');
    }

    carregarProvasPendentes();
  </script>
</body>
</html>
