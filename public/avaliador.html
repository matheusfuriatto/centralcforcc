<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central CFO - Gestão de Avaliações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 500: '#f59e0b', 600: '#d97706', 700: '#b45309' } } } }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-200">

  <div class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- BANNER SUPERIOR -->
    <div class="w-full h-32 rounded-2xl bg-cover bg-center border border-slate-200 dark:border-slate-800 shadow-sm" style="background-image: url('/assets/images/banner-cfo.png');"></div>

    <!-- CABEÇALHO -->
    <header class="flex flex-wrap justify-between items-center gap-4 p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
      <div class="flex items-center gap-4">
        <div class="relative w-14 h-14 rounded-2xl bg-slate-100 dark:bg-slate-800 border-2 border-brand-500 overflow-hidden flex items-center justify-center shrink-0">
          <img id="habboAvatar" src="/assets/images/default-avatar.png" alt="Avatar" class="w-16 h-auto mt-[-10px]">
        </div>
        <div>
          <div class="flex items-center gap-2">
            <h1 class="text-xl font-black text-slate-900 dark:text-white">Painel do Avaliador</h1>
            <span id="habboStatusBadge" class="px-2 py-0.5 text-xs rounded-full bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-semibold">Verificando...</span>
          </div>
          <p class="text-xs text-slate-500">Avaliador: <strong id="userNick" class="text-brand-500"></strong> | Visto por último: <span id="habboLastAccess">-</span></p>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button onclick="toggleTheme()" class="p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-100 dark:bg-slate-800">
          <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-amber-400"></i>
          <i data-lucide="moon" class="w-5 h-5 block dark:hidden text-slate-600"></i>
        </button>
        <button onclick="logout()" class="px-4 py-2.5 rounded-xl bg-red-500/10 text-red-600 dark:text-red-400 font-bold text-sm">Sair</button>
      </div>
    </header>

    <!-- NAVEGAÇÃO -->
    <nav class="flex gap-2 overflow-x-auto pb-2 border-b border-slate-200 dark:border-slate-800">
      <button onclick="mudarAba('cadastros')" id="tab-cadastros" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold bg-brand-500 text-black">Cadastrar & Token</button>
      <button onclick="mudarAba('provas')" id="tab-provas" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500">Avaliações & Provas</button>
      <button onclick="mudarAba('duvidas')" id="tab-duvidas" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500">Central de Dúvidas</button>
      <button onclick="mudarAba('documentos')" id="tab-documentos" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500">Central de Documentos</button>
    </nav>

    <!-- ABA CADASTRO & TOKEN -->
    <section id="content-cadastros" class="space-y-4">
      <div class="max-w-xl mx-auto p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-4">
        <h2 class="text-lg font-bold text-slate-900 dark:text-white flex items-center gap-2">Gerar Token de Avaliação</h2>
        <form onsubmit="gerarToken(event)" class="space-y-4">
          <input type="text" id="candNick" required placeholder="Nick do Candidato (ex: Popricard88)" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm">
          <button type="submit" class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-black font-extrabold rounded-xl text-sm">Gerar Token e Liberar Tentativa</button>
        </form>
        <div id="tokenResultado"></div>
      </div>
    </section>

    <!-- ABA PROVAS -->
    <section id="content-provas" class="hidden space-y-4">
      <div id="listaProvas" class="grid grid-cols-1 gap-4"></div>
    </section>

    <!-- ABA DÚVIDAS -->
    <section id="content-duvidas" class="hidden space-y-4">
      <div id="listaDuvidas" class="grid grid-cols-1 gap-4"></div>
    </section>

    <!-- ABA DOCUMENTOS -->
    <section id="content-documentos" class="hidden space-y-4">
      <div id="listaDocumentos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </section>

  </div>

  <!-- MODAL DE CORREÇÃO DE PROVA -->
  <div id="modalProva" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 max-w-4xl w-full max-h-[90vh] rounded-2xl flex flex-col overflow-hidden shadow-2xl">
      <div class="p-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-950">
        <div>
          <h3 id="modalTitulo" class="font-black text-slate-900 dark:text-white">Correção de Avaliação</h3>
          <p id="modalSubtitulo" class="text-xs text-slate-500"></p>
        </div>
        <button onclick="fecharModal()" class="p-2 text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>

      <div id="modalCorpo" class="p-6 overflow-y-auto space-y-6 flex-1"></div>

      <div class="p-4 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 space-y-3">
        <div class="flex gap-2 items-center">
          <input type="number" step="0.1" max="10" min="0" id="modalNota" placeholder="Nota Final (0-10)" class="w-36 p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm font-bold">
          <input type="text" id="modalFeedbackGeral" placeholder="Feedback Geral do Avaliado..." class="flex-1 p-2.5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">
          <button onclick="salvarCorrecaoModal()" class="px-6 py-2.5 bg-brand-500 hover:bg-brand-600 text-black font-extrabold rounded-xl text-sm">Salvar Correção</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth-guard.js"></script>
  <script>
    function initTheme() {
      const savedTheme = localStorage.getItem('cfo_theme') || 'dark';
      if (savedTheme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    }
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('cfo_theme', isDark ? 'dark' : 'light');
    }
    initTheme();

    const user = checkAuth('avaliador');
    let provaEmEdicao = null;
    document.getElementById('userNick').innerText = user.nick;
    lucide.createIcons();

    async function carregarHabboProfile() {
      try {
        const res = await fetch(`/api/avaliador?action=habboProfile&nick=${encodeURIComponent(user.nick)}`);
        const data = await res.json();
        document.getElementById('habboAvatar').src = `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${encodeURIComponent(user.nick)}&headonly=0&direction=2&head_direction=2&action=std&size=m`;
        const badge = document.getElementById('habboStatusBadge');
        if (data.online) {
          badge.className = "px-2 py-0.5 text-xs rounded-full bg-emerald-500/10 text-emerald-500 font-bold border border-emerald-500/20";
          badge.innerText = "ONLINE";
        } else {
          badge.className = "px-2 py-0.5 text-xs rounded-full bg-slate-500/10 text-slate-400 font-bold border border-slate-500/20";
          badge.innerText = "OFFLINE";
        }
        document.getElementById('habboLastAccess').innerText = data.lastAccess;
      } catch (e) {}
    }
    carregarHabboProfile();

    function mudarAba(aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500");
      document.getElementById(`tab-${aba}`).className = "tab-btn px-5 py-2.5 rounded-xl text-sm font-bold bg-brand-500 text-black";
      ['cadastros', 'provas', 'duvidas', 'documentos'].forEach(a => document.getElementById(`content-${a}`).classList.add('hidden'));
      document.getElementById(`content-${aba}`).classList.remove('hidden');

      if (aba === 'provas') carregarProvas();
      if (aba === 'duvidas') carregarDuvidas();
      if (aba === 'documentos') carregarDocumentos();
    }

    async function gerarToken(e) {
      e.preventDefault();
      const nickCandidato = document.getElementById('candNick').value;
      const res = await fetch('/api/avaliador?action=gerarToken', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickAvaliador: user.nick, nickCandidato })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('tokenResultado').innerHTML = `
          <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-600 dark:text-emerald-400 text-sm space-y-1">
            <p class="font-bold">${data.message}</p>
            <p>Token: <code class="font-mono font-bold">${data.token}</code></p>
          </div>
        `;
        document.getElementById('candNick').value = '';
      }
    }

    async function carregarProvas() {
      const res = await fetch(`/api/avaliador?action=listarProvas&nick=${encodeURIComponent(user.nick)}`);
      const data = await res.json();
      window.provasCache = data.provas || [];
      const container = document.getElementById('listaProvas');

      container.innerHTML = window.provasCache.map(p => `
        <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex justify-between items-center">
          <div class="flex items-center gap-3">
            <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=${encodeURIComponent(p.candidato_nick)}&headonly=1&size=m" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800">
            <div>
              <h4 class="font-bold text-slate-900 dark:text-white">${p.candidato_nick} <span class="text-xs text-slate-500">| Token: ${p.token_utilizado}</span></h4>
              <p class="text-xs text-slate-500">Status: <span class="text-brand-500 font-bold">${p.status}</span> ${p.nota !== null ? '| Nota: ' + p.nota : ''}</p>
            </div>
          </div>
          <button onclick="abrirModalProva('${p.id}')" class="px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-xs font-bold">
            ${p.status === 'Submetido' ? 'Corrigir Prova' : 'Visualizar Prova'}
          </button>
        </div>
      `).join('');
    }

    // Função para estimar pontuação automaticamente baseada em similaridade simples de texto
    function calcularPontuacaoSugerida(respostas, questoes) {
      if (!questoes || questoes.length === 0) return 0;
      let totalMatch = 0;

      questoes.forEach(q => {
        const resp = (respostas[q.id] || '').toLowerCase().trim();
        const gabarito = (q.gabarito_esperado || '').toLowerCase().trim();
        if (!resp || !gabarito) return;

        const palavrasGabarito = gabarito.split(/\s+/).filter(w => w.length > 3);
        if (palavrasGabarito.length === 0) return;

        let acertadas = 0;
        palavrasGabarito.forEach(w => {
          if (resp.includes(w)) acertadas++;
        });

        totalMatch += (acertadas / palavrasGabarito.length);
      });

      const notaEstimada = (totalMatch / questoes.length) * 10;
      return Math.min(10, Math.max(0, notaEstimada)).toFixed(1);
    }

    function abrirModalProva(id) {
      const p = window.provasCache.find(x => x.id === id);
      if (!p) return;
      provaEmEdicao = p;

      const questoes = p.questoes_json || [];
      const respostas = p.respostas_json || {};
      const feedbacksQuestoes = p.feedbacks_questoes || {};

      const notaSugerida = calcularPontuacaoSugerida(respostas, questoes);

      document.getElementById('modalTitulo').innerText = `Avaliação de ${p.candidato_nick}`;
      document.getElementById('modalSubtitulo').innerText = `Token: ${p.token_utilizado} | Status: ${p.status}`;
      document.getElementById('modalNota').value = p.nota !== null ? p.nota : notaSugerida;
      document.getElementById('modalFeedbackGeral').value = p.feedback_avaliador || '';

      const corpo = document.getElementById('modalCorpo');
      corpo.innerHTML = `
        <div class="p-3 rounded-xl bg-amber-500/10 border border-amber-500/20 text-amber-500 text-xs flex justify-between items-center">
          <span>💡 <strong>Análise da Plataforma:</strong> Sugestão de nota preliminar baseada nos gabaritos.</span>
          <span class="text-sm font-black">${notaSugerida} / 10</span>
        </div>
      ` + questoes.map((q, i) => {
        const respAluno = respostas[q.id] || 'Não respondida';
        const fbQuestao = feedbacksQuestoes[q.id] || '';

        return `
          <div class="p-4 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 space-y-3">
            <span class="text-xs font-bold text-brand-500 uppercase">Questão ${i + 1} - ${q.categoria || 'Geral'}</span>
            <p class="font-bold text-sm text-slate-900 dark:text-white">${q.enunciado || q.titulo}</p>

            <div class="p-2.5 rounded-lg bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 text-xs">
              <strong>Gabarito Esperado:</strong> ${q.gabarito_esperado || 'Não cadastrado'}
            </div>

            <div class="p-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs space-y-1">
              <span class="text-slate-400 font-bold block">Resposta do Aluno:</span>
              <p class="text-slate-800 dark:text-slate-200 whitespace-pre-wrap">${respAluno}</p>
            </div>

            <div>
              <label class="text-[11px] font-bold text-slate-400">Feedback Individual desta Questão:</label>
              <input type="text" data-fb-questao-id="${q.id}" value="${fbQuestao}" placeholder="Ex: Faltou citar o artigo correspondente..." class="mt-1 w-full p-2 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs">
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('modalProva').classList.remove('hidden');
    }

    function fecharModal() {
      document.getElementById('modalProva').classList.add('hidden');
    }

    async function salvarCorrecaoModal() {
      if (!provaEmEdicao) return;
      const nota = document.getElementById('modalNota').value;
      const feedbackGeral = document.getElementById('modalFeedbackGeral').value;

      const feedbacksQuestoes = {};
      document.querySelectorAll('[data-fb-questao-id]').forEach(el => {
        feedbacksQuestoes[el.getAttribute('data-fb-questao-id')] = el.value.trim();
      });

      if (nota === '') return alert('Informe a nota.');

      await fetch('/api/avaliador?action=corrigir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          provaId: provaEmEdicao.id,
          nota,
          feedbackGeral,
          feedbacksQuestoes
        })
      });

      alert('Correção registrada!');
      fecharModal();
      carregarProvas();
    }

    async function carregarDuvidas() {
      const res = await fetch('/api/avaliador?action=listarDuvidas');
      const data = await res.json();
      const container = document.getElementById('listaDuvidas');

      container.innerHTML = (data.duvidas || []).map(d => `
        <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-3">
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
              <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=${encodeURIComponent(d.alunoNick || '')}&headonly=1&size=s" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800">
              <h4 class="font-bold text-slate-900 dark:text-white">${d.titulo} <span class="text-xs text-slate-500">(${d.alunoNick})</span></h4>
            </div>
            <span class="px-2.5 py-1 text-xs font-bold rounded-full bg-slate-100 dark:bg-slate-800 text-brand-500">${d.status}</span>
          </div>
          <p class="text-xs text-slate-600 dark:text-slate-300 bg-slate-50 dark:bg-slate-950 p-3 rounded-xl border border-slate-200 dark:border-slate-800">${d.pergunta}</p>
          ${d.status === 'Pendente' ? `
            <button onclick="assumirDuvida('${d.id}')" class="px-3 py-1.5 bg-brand-500 text-black text-xs font-bold rounded-lg">Assumir Dúvida</button>
          ` : d.status === 'Em Andamento' && d.avaliadorNick === user.nick ? `
            <div class="flex gap-2">
              <input type="text" id="resp-${d.id}" placeholder="Digite a resposta..." class="flex-1 p-2 rounded-lg bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-xs">
              <button onclick="responderDuvida('${d.id}')" class="px-3 py-1.5 bg-emerald-500 text-white text-xs font-bold rounded-lg">Enviar</button>
            </div>
          ` : `
            <div class="flex items-center gap-2 text-xs text-slate-500">
              <img src="https://www.habbo.com.br/habbo-imaging/avatarimage?user=${encodeURIComponent(d.avaliadorNick || '')}&headonly=1&size=s" class="w-6 h-6 rounded-full bg-slate-100 dark:bg-slate-800">
              <span>Respondido por: <strong>${d.avaliadorNick}</strong> ${d.resposta ? '| Resposta: ' + d.resposta : ''}</span>
            </div>
          `}
        </div>
      `).join('');
    }

    async function assumirDuvida(id) {
      await fetch('/api/avaliador?action=assumirDuvida', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, nickAvaliador: user.nick })
      });
      carregarDuvidas();
    }

    async function responderDuvida(id) {
      const resposta = document.getElementById(`resp-${id}`).value;
      if (!resposta.trim()) return alert('Digite a resposta.');
      await fetch('/api/avaliador?action=responderDuvida', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, resposta, nickAvaliador: user.nick })
      });
      carregarDuvidas();
    }

    async function carregarDocumentos() {
      const res = await fetch('/api/avaliador?action=listarDocumentos');
      const data = await res.json();
      const container = document.getElementById('listaDocumentos');

      container.innerHTML = (data.documentos || []).map(doc => `
        <a href="${doc.url}" target="_blank" class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:border-brand-500 transition flex items-center justify-between group">
          <div class="flex items-center gap-3">
            <div class="p-2.5 rounded-xl bg-brand-500/10 text-brand-500 group-hover:bg-brand-500 group-hover:text-black transition">
              <i data-lucide="file-text" class="w-5 h-5"></i>
            </div>
            <div>
              <h4 class="font-bold text-sm text-slate-900 dark:text-white group-hover:text-brand-500 transition">${doc.titulo}</h4>
              <p class="text-xs text-slate-500">${doc.categoria || 'Documento Oficial'}</p>
            </div>
          </div>
          <i data-lucide="external-link" class="w-4 h-4 text-slate-400 group-hover:text-brand-500 transition"></i>
        </a>
      `).join('');
      lucide.createIcons();
    }
  </script>
</body>
</html>
