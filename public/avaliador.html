<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central CFO - Gestão de Avaliações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 500: '#f59e0b', 600: '#d97706', 700: '#b45309' } } } }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-200">

  <div class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <div class="w-full h-32 rounded-2xl bg-cover bg-center border border-slate-200 dark:border-slate-800 shadow-sm" style="background-image: url('/assets/images/banner-cfo.png');"></div>

    <header class="flex flex-wrap justify-between items-center gap-4 p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
      <div class="flex items-center gap-4">
        <img id="habboAvatar" src="/assets/images/default-avatar.png" class="w-14 h-14 rounded-2xl border-2 border-brand-500 bg-slate-800">
        <div>
          <h1 class="text-xl font-black text-slate-900 dark:text-white">Painel do Avaliador</h1>
          <p class="text-xs text-slate-500">Avaliador: <strong id="userNick" class="text-brand-500"></strong></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="abrirModalTrocarSenha()" class="px-3 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-xs font-bold">Trocar Senha</button>
        <button onclick="logout()" class="px-4 py-2 bg-red-500/10 text-red-500 font-bold text-xs rounded-xl">Sair</button>
      </div>
    </header>

    <nav class="flex gap-2 overflow-x-auto pb-2 border-b border-slate-200 dark:border-slate-800">
      <button onclick="mudarAba('cadastros')" id="tab-cadastros" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold bg-brand-500 text-black">Cadastrar & Token</button>
      <button onclick="mudarAba('solicitacoes')" id="tab-solicitacoes" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500">Solicitações de Acesso</button>
      <button onclick="mudarAba('provas')" id="tab-provas" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500">Avaliações & Provas</button>
    </nav>

    <!-- ABA CADASTRO & TOKEN -->
    <section id="content-cadastros" class="space-y-4">
      <div class="max-w-xl mx-auto p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-4">
        <h2 class="text-lg font-bold">Gerar Token e Senha do Avaliado</h2>
        <form onsubmit="gerarToken(event)" class="space-y-4">
          <input type="text" id="candNick" required placeholder="Nick do Candidato (ex: Popricard88)" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm">
          <button type="submit" class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-black font-extrabold rounded-xl text-sm">Gerar Token e Senha</button>
        </form>
        <div id="tokenResultado"></div>
      </div>
    </section>

    <!-- ABA SOLICITAÇÕES -->
    <section id="content-solicitacoes" class="hidden space-y-4">
      <h2 class="text-lg font-bold">Aprovar Solicitações de Acesso</h2>
      <div id="listaSolicitacoes" class="grid grid-cols-1 gap-3"></div>
    </section>

    <section id="content-provas" class="hidden space-y-4"><div id="listaProvas"></div></section>
  </div>

  <!-- MODAL TROCAR SENHA -->
  <div id="modalTrocarSenha" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 max-w-md w-full p-6 rounded-2xl space-y-4 shadow-2xl">
      <h3 class="font-bold text-sm">Alterar Minha Senha</h3>
      <input type="password" id="senhaAtualAvaliador" placeholder="Senha Atual" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm">
      <input type="password" id="novaSenhaAvaliador" placeholder="Nova Senha" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm">
      <div class="flex gap-2">
        <button onclick="salvarNovaSenhaAvaliador()" class="flex-1 py-3 bg-brand-500 text-black font-extrabold rounded-xl text-sm">Salvar</button>
        <button onclick="fecharModalTrocarSenha()" class="px-4 py-3 bg-slate-800 text-white rounded-xl text-sm">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth-guard.js"></script>
  <script>
    const user = checkAuth('avaliador');
    document.getElementById('userNick').innerText = user.nick;
    lucide.createIcons();

    function mudarAba(aba) {
      document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500");
      document.getElementById(`tab-${aba}`).className = "tab-btn px-5 py-2.5 rounded-xl text-sm font-bold bg-brand-500 text-black";
      ['cadastros', 'solicitacoes', 'provas'].forEach(a => document.getElementById(`content-${a}`).classList.add('hidden'));
      document.getElementById(`content-${aba}`).classList.remove('hidden');

      if (aba === 'solicitacoes') carregarSolicitacoes();
    }

    async function gerarToken(e) {
      e.preventDefault();
      const nickCandidato = document.getElementById('candNick').value;
      const res = await fetch('/api/avaliador?action=gerarToken', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickAvaliador: user.nick, nickCandidato })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('tokenResultado').innerHTML = `
          <div class="p-4 rounded-xl bg-emerald-500/10 border border-emerald-500/20 text-emerald-600 dark:text-emerald-400 text-sm space-y-2">
            <p class="font-bold">${data.message}</p>
            <p>Token: <code class="font-mono font-bold">${data.token}</code></p>
            <p class="text-base font-bold bg-slate-900 p-2 rounded-lg text-amber-400">Senha do Candidato: <code>${data.senhaGerada}</code></p>
          </div>
        `;
        document.getElementById('candNick').value = '';
      }
    }

    async function carregarSolicitacoes() {
      const res = await fetch('/api/avaliador?action=listarSolicitacoes');
      const data = await res.json();
      const container = document.getElementById('listaSolicitacoes');

      if (!data.solicitacoes || data.solicitacoes.length === 0) {
        container.innerHTML = `<p class="text-xs text-slate-500 py-4">Nenhuma solicitação pendente.</p>`;
        return;
      }

      container.innerHTML = data.solicitacoes.map(s => `
        <div class="p-4 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex justify-between items-center">
          <div>
            <p class="font-bold text-sm">${s.nickPolicial}</p>
            <p class="text-xs text-slate-500">Solicitado em: ${new Date().toLocaleDateString('pt-BR')}</p>
          </div>
          <div class="flex items-center gap-2">
            <select id="role-${s.id}" class="p-2 rounded-lg bg-slate-50 dark:bg-slate-950 border text-xs">
              <option value="candidato">Candidato / Aluno</option>
              <option value="avaliador">Avaliador</option>
              <option value="gestor">Gestor</option>
            </select>
            <button onclick="aprovar('${s.id}')" class="px-3 py-1.5 bg-emerald-500 text-white font-bold text-xs rounded-lg">Aprovar</button>
            <button onclick="recusar('${s.id}')" class="px-3 py-1.5 bg-red-500 text-white font-bold text-xs rounded-lg">Recusar</button>
          </div>
        </div>
      `).join('');
    }

    async function aprovar(id) {
      const role = document.getElementById(`role-${id}`).value;
      await fetch('/api/avaliador?action=aprovarSolicitacao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, role })
      });
      alert('Acesso Aprovado!');
      carregarSolicitacoes();
    }

    async function recusar(id) {
      if (!confirm('Recusar esta solicitação?')) return;
      await fetch('/api/avaliador?action=recusarSolicitacao', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      carregarSolicitacoes();
    }

    function abrirModalTrocarSenha() { document.getElementById('modalTrocarSenha').classList.remove('hidden'); }
    function fecharModalTrocarSenha() { document.getElementById('modalTrocarSenha').classList.add('hidden'); }

    async function salvarNovaSenhaAvaliador() {
      const senhaAtual = document.getElementById('senhaAtualAvaliador').value;
      const novaSenha = document.getElementById('novaSenhaAvaliador').value;
      const res = await fetch('/api/auth?action=alterarMinhaSenha', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nick: user.nick, senhaAtual, novaSenha })
      });
      if (res.ok) { alert('Senha alterada!'); fecharModalTrocarSenha(); }
    }
  </script>
</body>
</html>
