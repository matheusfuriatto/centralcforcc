<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Avaliador - CFO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    [data-theme="dark"] { background-color: #121212; color: #e0e0e0; }
    [data-theme="dark"] .card { background-color: #1e1e1e; color: #fff; border-color: #333; }
    [data-theme="light"] { background-color: #f8f9fa; color: #212529; }
  </style>
</head>
<body class="p-3 p-md-4">
  <div class="container">
    <header class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h2>Painel do Avaliador (<span id="userNick"></span>)</h2>
      <div>
        <button class="btn btn-outline-secondary btn-sm me-2" onclick="toggleTheme()">🌙 / ☀️ Tema</button>
        <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <ul class="nav nav-pills mb-4 gap-2">
      <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#gerarTokenTab">Cadastrar Avaliado</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#provasTab" onclick="carregarProvas()">Avaliações / Tokens</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#duvidasTab" onclick="carregarDuvidas()">Central de Dúvidas</a></li>
    </ul>

    <div class="tab-content">
      <!-- Gerar Token -->
      <div class="tab-pane fade show active" id="gerarTokenTab">
        <div class="card p-3 col-md-6 mx-auto">
          <h4>Gerar Novo Token de Avaliação</h4>
          <form onsubmit="gerarToken(event)">
            <div class="mb-3">
              <label class="form-label">Nick Policial do Candidato</label>
              <input type="text" id="candNick" class="form-control" placeholder="ex: aluno1" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Gerar Token</button>
          </form>
          <div id="tokenResultado" class="mt-3"></div>
        </div>
      </div>

      <!-- Avaliações / Tokens -->
      <div class="tab-pane fade" id="provasTab">
        <div id="listaProvas" class="vstack gap-3"></div>
      </div>

      <!-- Dúvidas -->
      <div class="tab-pane fade" id="duvidasTab">
        <div id="listaDuvidas" class="vstack gap-3"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const user = JSON.parse(sessionStorage.getItem('cfo_user') || '{}');
    if (!user.nick) window.location.href = '/index.html';
    document.getElementById('userNick').innerText = user.nick;

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function logout() { sessionStorage.clear(); window.location.href = '/index.html'; }

    async function gerarToken(e) {
      e.preventDefault();
      const nickCandidato = document.getElementById('candNick').value;
      const res = await fetch('/api/avaliador?action=gerarToken', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickAvaliador: user.nick, nickCandidato })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('tokenResultado').innerHTML = `<div class="alert alert-success">Token Gerado: <strong>${data.token}</strong></div>`;
      } else {
        alert(data.error);
      }
    }

    async function carregarProvas() {
      const res = await fetch(`/api/avaliador?action=listarProvas&nick=${user.nick}`);
      const data = await res.json();
      const div = document.getElementById('listaProvas');
      div.innerHTML = data.provas.map(p => `
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center flex-wrap">
            <div>
              <h5>Aluno: ${p.candidato_nick} | Token: ${p.token_utilizado}</h5>
              <span class="badge ${p.status === 'Corrigido' ? 'bg-success' : p.status === 'Submetido' ? 'bg-danger' : 'bg-secondary'}">${p.status}</span>
            </div>
          </div>
          ${p.status === 'Submetido' ? `
            <div class="mt-3 border-top pt-2">
              <h6>Enviar Correção</h6>
              <div class="row g-2">
                <div class="col-md-3">
                  <input type="number" step="0.1" max="10" min="0" id="nota-${p.id}" class="form-control" placeholder="Nota (0-10)">
                </div>
                <div class="col-md-7">
                  <input type="text" id="fb-${p.id}" class="form-control" placeholder="Feedback da avaliação">
                </div>
                <div class="col-md-2">
                  <button class="btn btn-primary w-100" onclick="corrigir(${p.id})">Finalizar</button>
                </div>
              </div>
            </div>
          ` : p.status === 'Corrigido' ? `<p class="mt-2 mb-0 text-success"><strong>Nota:</strong> ${p.nota} - <strong>Feedback:</strong> ${p.feedback_avaliador}</p>` : ''}
        </div>
      `).join('') || '<p>Nenhuma avaliação pendente.</p>';
    }

    async function corrigir(id) {
      const nota = document.getElementById(`nota-${id}`).value;
      const feedback = document.getElementById(`fb-${id}`).value;
      await fetch('/api/avaliador?action=corrigir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provaId: id, nota, feedback })
      });
      alert('Correção salva!');
      carregarProvas();
    }

    async function carregarDuvidas() {
      const res = await fetch('/api/avaliador?action=listarDuvidas');
      const data = await res.json();
      const div = document.getElementById('listaDuvidas');
      div.innerHTML = data.duvidas.map(d => `
        <div class="card p-3">
          <div class="d-flex justify-content-between">
            <h5>${d.titulo} <small class="text-muted">(${d.aluno_nick})</small></h5>
            <span class="badge bg-info">${d.status}</span>
          </div>
          <p class="my-2">${d.pergunta}</p>
          ${d.status === 'Pendente' ? `
            <button class="btn btn-sm btn-outline-warning w-auto" onclick="assumirDuvida(${d.id})">Assumir Dúvida</button>
          ` : d.status === 'Em Andamento' && d.avaliador_nick === user.nick ? `
            <div class="mt-2">
              <input type="text" id="resp-${d.id}" class="form-control mb-2" placeholder="Digite a resposta...">
              <button class="btn btn-sm btn-success" onclick="responderDuvida(${d.id})">Enviar Resposta</button>
            </div>
          ` : `<p class="mb-0 text-muted">Atribuído a: ${d.avaliador_nick} ${d.resposta ? '| Resposta: ' + d.resposta : ''}</p>`}
        </div>
      `).join('');
    }

    async function assumirDuvida(id) {
      await fetch('/api/avaliador?action=assumirDuvida', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, nickAvaliador: user.nick })
      });
      carregarDuvidas();
    }

    async function responderDuvida(id) {
      const resposta = document.getElementById(`resp-${id}`).value;
      await fetch('/api/avaliador?action=responderDuvida', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, resposta })
      });
      carregarDuvidas();
    }
  </script>
</body>
</html>
