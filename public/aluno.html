<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Aluno - CFO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    [data-theme="dark"] { background-color: #121212; color: #e0e0e0; }
    [data-theme="dark"] .card, [data-theme="dark"] .modal-content { background-color: #1e1e1e; color: #fff; border-color: #333; }
    [data-theme="light"] { background-color: #f8f9fa; color: #212529; }
    .nav-pills .nav-link.active { background-color: #0d6efd; }

    /* Estilo do Avatar Habbo */
    .avatar-container {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.1);
      border: 2px solid #0d6efd;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-container img {
      width: 54px;
      height: auto;
      margin-top: -10px; /* Ajuste para centralizar o rosto do Habbo */
    }
  </style>
</head>
<body class="p-3 p-md-4">
  <div class="container">
    <!-- Cabeçalho com Avatar Habbo e Usuário -->
    <header class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2 pb-3 border-bottom">
      <div class="d-flex align-items-center gap-3">
        <div class="avatar-container shadow-sm">
          <img id="habboAvatar" src="" alt="Avatar Habbo" onerror="this.src='https://www.habbo.com.br/habbo-imaging/avatarimage?user=Habbo&headonly=1'">
        </div>
        <div>
          <h4 class="mb-0">Painel do Aluno</h4>
          <small class="text-muted"><span id="userNick"></span> (<span id="userNome"></span>)</small>
        </div>
      </div>

      <div class="d-flex align-items-center gap-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="toggleTheme()">🌙 / ☀️ Tema</button>
        <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <ul class="nav nav-pills mb-4 gap-2" id="menuTabs">
      <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#avaliacoesTab" onclick="carregarMinhasAvaliacoes()">Minhas Avaliações</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#enviarDuvidaTab">Enviar Dúvida</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#minhasDuvidasTab" onclick="carregarMinhasDuvidas()">Minhas Dúvidas</a></li>
    </ul>

    <div class="tab-content">
      <!-- Minhas Avaliações -->
      <div class="tab-pane fade show active" id="avaliacoesTab">
        <div id="listaAvaliacoes" class="row g-3"></div>
      </div>

      <!-- Enviar Dúvida -->
      <div class="tab-pane fade" id="enviarDuvidaTab">
        <div class="card p-3 col-md-8 mx-auto">
          <h4>Nova Dúvida</h4>
          <form onsubmit="enviarDuvida(event)">
            <div class="mb-3">
              <label class="form-label">Título</label>
              <input type="text" id="duvidaTitulo" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Pergunta</label>
              <textarea id="duvidaPergunta" class="form-control" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar Dúvida</button>
          </form>
        </div>
      </div>

      <!-- Minhas Dúvidas -->
      <div class="tab-pane fade" id="minhasDuvidasTab">
        <div id="listaDuvidas" class="vstack gap-3"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const user = JSON.parse(sessionStorage.getItem('cfo_user') || '{}');
    if (!user.nick) window.location.href = '/index.html';

    // Carregar Informações do Usuário e Avatar do Habbo
    document.getElementById('userNick').innerText = user.nick;
    document.getElementById('userNome').innerText = user.nome || 'Aluno';
    document.getElementById('habboAvatar').src = `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${encodeURIComponent(user.nick)}&action=std&direction=2&head_direction=2&gesture=sml&size=m`;

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    function logout() { sessionStorage.clear(); window.location.href = '/index.html'; }

    async function carregarMinhasAvaliacoes() {
      const res = await fetch(`/api/candidato?action=minhasAvaliacoes&nick=${user.nick}`);
      const data = await res.json();
      const div = document.getElementById('listaAvaliacoes');
      div.innerHTML = (data.provas || []).map(p => `
        <div class="col-md-6">
          <div class="card p-3">
            <div class="d-flex justify-content-between">
              <h5>Token: ${p.token_utilizado}</h5>
              <span class="badge ${p.status === 'Corrigido' ? 'bg-success' : 'bg-warning'}">${p.status}</span>
            </div>
            <p class="mb-1"><strong>Pontuação:</strong> ${p.nota !== null ? p.nota + ' / 10' : 'Em Avaliação'}</p>
            <p class="mb-1"><strong>Feedback:</strong> ${p.feedback_avaliador || 'Aguardando correção...'}</p>
          </div>
        </div>
      `).join('') || '<p>Nenhuma avaliação encontrada.</p>';
    }

    async function enviarDuvida(e) {
      e.preventDefault();
      const titulo = document.getElementById('duvidaTitulo').value;
      const pergunta = document.getElementById('duvidaPergunta').value;
      await fetch('/api/candidato?action=enviarDuvida', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nick: user.nick, titulo, pergunta })
      });
      alert('Dúvida enviada!');
      e.target.reset();
    }

    async function carregarMinhasDuvidas() {
      const res = await fetch(`/api/candidato?action=minhasDuvidas&nick=${user.nick}`);
      const data = await res.json();
      const div = document.getElementById('listaDuvidas');
      div.innerHTML = (data.duvidas || []).map(d => `
        <div class="card p-3">
          <div class="d-flex justify-content-between">
            <h5>${d.titulo}</h5>
            <span class="badge bg-info">${d.status}</span>
          </div>
          <p class="my-2"><strong>Pergunta:</strong> ${d.pergunta}</p>
          <p class="mb-0 text-muted"><strong>Atribuído a:</strong> ${d.avaliador_nick || 'Aguardando avaliador'}</p>
          ${d.resposta ? `<div class="alert alert-success mt-2 mb-0"><strong>Resposta:</strong> ${d.resposta}</div>` : ''}
        </div>
      `).join('') || '<p>Nenhuma dúvida cadastrada.</p>';
    }

    carregarMinhasAvaliacoes();
  </script>
</body>
</html>
