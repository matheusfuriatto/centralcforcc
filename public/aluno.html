<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central CFO - Portal do Aluno</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } } } }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 transition-colors duration-200">

  <div class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <div class="w-full h-32 rounded-2xl bg-cover bg-center border border-slate-200 dark:border-slate-800 shadow-sm" style="background-image: url('/assets/images/banner-cfo.png');"></div>

    <header class="flex flex-wrap justify-between items-center gap-4 p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
      <div class="flex items-center gap-4">
        <img id="habboAvatar" src="/assets/images/default-avatar.png" class="w-14 h-14 rounded-2xl border-2 border-brand-500 bg-slate-800">
        <div>
          <h1 class="text-xl font-black text-slate-900 dark:text-white">Painel do Aluno</h1>
          <p class="text-xs text-slate-500">Nick: <strong id="userNick" class="text-brand-500"></strong></p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button onclick="abrirModalTrocarSenha()" class="px-3 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 text-xs font-bold">Trocar Senha</button>
        <button onclick="logout()" class="px-4 py-2 bg-red-500/10 text-red-500 font-bold text-xs rounded-xl">Sair</button>
      </div>
    </header>

    <nav class="flex gap-2 overflow-x-auto pb-2 border-b border-slate-200 dark:border-slate-800">
      <button onclick="mudarAba('realizar')" id="tab-realizar" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold bg-brand-500 text-white">Realizar Prova</button>
      <button onclick="mudarAba('avaliacoes')" id="tab-avaliacoes" class="tab-btn px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500">Minhas Avaliações</button>
    </nav>

    <section id="content-realizar" class="space-y-6">
      <div id="boxBuscaToken" class="max-w-md mx-auto p-6 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-4">
        <h2 class="text-lg font-bold">Iniciar Avaliação</h2>
        <form onsubmit="buscarProva(event)" class="space-y-4">
          <input type="text" id="tokenInput" required placeholder="Ex: CFO-AB12CD" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 font-mono text-sm">
          <button type="submit" class="w-full py-3 bg-brand-500 hover:bg-brand-600 text-white font-extrabold rounded-xl text-sm">Acessar Prova</button>
        </form>
      </div>
      <div id="boxProva" class="hidden space-y-6"><form onsubmit="submeterProva(event)" id="formProva" class="space-y-4"></form></div>
    </section>
  </div>

  <!-- MODAL TROCAR SENHA ALUNO -->
  <div id="modalTrocarSenha" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 max-w-md w-full p-6 rounded-2xl space-y-4 shadow-2xl">
      <h3 class="font-bold text-sm">Alterar Minha Senha</h3>
      <input type="password" id="senhaAtualAluno" placeholder="Senha Atual" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm">
      <input type="password" id="novaSenhaAluno" placeholder="Nova Senha" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-sm">
      <div class="flex gap-2">
        <button onclick="salvarNovaSenhaAluno()" class="flex-1 py-3 bg-brand-500 text-white font-extrabold rounded-xl text-sm">Salvar</button>
        <button onclick="fecharModalTrocarSenha()" class="px-4 py-3 bg-slate-800 text-white rounded-xl text-sm">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/auth-guard.js"></script>
  <script>
    const user = checkAuth('candidato');
    document.getElementById('userNick').innerText = user.nick;

    function abrirModalTrocarSenha() { document.getElementById('modalTrocarSenha').classList.remove('hidden'); }
    function fecharModalTrocarSenha() { document.getElementById('modalTrocarSenha').classList.add('hidden'); }

    async function salvarNovaSenhaAluno() {
      const senhaAtual = document.getElementById('senhaAtualAluno').value;
      const novaSenha = document.getElementById('novaSenhaAluno').value;
      const res = await fetch('/api/auth?action=alterarMinhaSenha', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nick: user.nick, senhaAtual, novaSenha })
      });
      if (res.ok) { alert('Senha alterada com sucesso!'); fecharModalTrocarSenha(); }
    }
  </script>
</body>
</html>
