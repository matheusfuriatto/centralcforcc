<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central do CFO - Gestão</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script src="/assets/js/auth-guard.js"></script>
  <script>const currentUser = checkAuth('gestor');</script>
</head>
<body class="min-h-screen flex flex-col justify-between">

  <header class="border-b border-gray-800 bg-gray-950/90 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <img src="/assets/images/logo-cfo.png" class="w-10 h-10" alt="Logo CFO">
        <div>
          <h1 class="font-extrabold text-base text-emerald-400">GESTÃO SUPERIOR</h1>
          <p id="user-role-badge" class="text-[10px] text-gray-400 uppercase tracking-widest"></p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <span id="user-display-name" class="text-xs font-bold text-gray-300"></span>
        <button onclick="logout()" class="px-3 py-1.5 bg-rose-500/10 border border-rose-500/30 text-rose-400 hover:bg-rose-500/20 rounded-lg text-xs font-semibold">Sair</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6 flex-grow w-full space-y-6">
    <div class="rounded-2xl overflow-hidden border border-gray-800 shadow-xl">
      <img src="/assets/images/banner-cfo.png" alt="Banner CFO" class="w-full h-auto object-cover">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="glass-card p-6 rounded-2xl space-y-4">
        <h4 class="font-bold text-white text-sm border-b border-gray-800 pb-2">Cadastrar Policial</h4>
        <div class="grid grid-cols-2 gap-2">
          <input type="text" id="gest-nome" placeholder="Nome Completo" class="bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs">
          <input type="text" id="gest-nick" placeholder="Nick Policial" class="bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs">
        </div>
        <input type="password" id="gest-senha" placeholder="Senha Acesso" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs">
        <select id="gest-role" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs text-gray-300">
          <option value="candidato">Aluno / Candidato</option>
          <option value="avaliador">Avaliador</option>
          <option value="gestor">Gestor</option>
        </select>
        <button onclick="cadastrarUsuario()" class="w-full py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold">CADASTRAR</button>
        <div id="lista-usuarios" class="space-y-2 pt-2 max-h-60 overflow-y-auto"></div>
      </div>

      <div class="glass-card p-6 rounded-2xl space-y-4">
        <h4 class="font-bold text-white text-sm border-b border-gray-800 pb-2">Cadastrar Questão</h4>
        <input type="text" id="q-cat" placeholder="Categoria" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs">
        <input type="text" id="q-tit" placeholder="Título" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs">
        <textarea id="q-enu" placeholder="Enunciado..." rows="2" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs"></textarea>
        <textarea id="q-gab" placeholder="Gabarito..." rows="2" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2 text-xs"></textarea>
        <button onclick="cadastrarQuestao()" class="w-full py-2 bg-emerald-600 text-white rounded-xl text-xs font-bold">SALVAR QUESTÃO</button>
        <div id="lista-questoes" class="space-y-2 pt-2 max-h-60 overflow-y-auto"></div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    async function carregarGestao() {
      const res = await fetch('/api/gestao?action=dashboard');
      const data = await res.json();

      document.getElementById('lista-usuarios').innerHTML = data.usuarios.map(u => `
        <div class="flex justify-between items-center bg-gray-900 p-2 rounded text-xs">
          <span>${u.nome} (${u.nick_policial}) - <strong class="uppercase text-emerald-400">${u.role}</strong></span>
          <button onclick="removerUsuario(${u.id})" class="text-rose-400">Excluir</button>
        </div>
      `).join('');

      document.getElementById('lista-questoes').innerHTML = data.questoes.map(q => `
        <div class="flex justify-between items-center bg-gray-900 p-2 rounded text-xs">
          <span>${q.titulo} (${q.categoria})</span>
          <button onclick="excluirQuestao(${q.id})" class="text-rose-400">Excluir</button>
        </div>
      `).join('');
    }

    async function cadastrarUsuario() {
      const nome = document.getElementById('gest-nome').value;
      const nick = document.getElementById('gest-nick').value;
      const senha = document.getElementById('gest-senha').value;
      const role = document.getElementById('gest-role').value;

      await fetch('/api/gestao?action=cadastrarUsuario', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, nick, senha, role })
      });
      carregarGestao();
    }

    carregarGestao();
  </script>
</body>
</html>
