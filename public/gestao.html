<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central CFO - Painel do Gestor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' } } } }
    }
  </script>
</head>
<body class="p-4 md:p-8 min-h-screen bg-slate-950 text-slate-100 flex flex-col items-center">

  <div class="max-w-6xl w-full space-y-6">

    <!-- BANNER SUPERIOR -->
    <div class="w-full h-32 rounded-2xl bg-cover bg-center border border-slate-800 shadow-sm" style="background-image: url('/assets/images/banner-cfo.png');"></div>

    <header class="flex justify-between items-center flex-wrap gap-4">
      <div class="flex items-center gap-3">
        <img id="habboAvatar" src="" class="w-12 h-12 rounded-full border-2 border-purple-500 bg-slate-800">
        <div>
          <h1 class="text-2xl font-extrabold text-white">Central CFO <span class="text-purple-400">· Gestor</span></h1>
          <p class="text-slate-400 text-sm"><span id="userNick"></span> (<span id="userNome"></span>)</p>
        </div>
      </div>
      <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white text-sm font-semibold px-4 py-2 rounded-xl">Sair</button>
    </header>

    <div class="flex justify-center border-b border-slate-800 pb-4 gap-4 flex-wrap">
      <button onclick="mudarAbaGestor('usuarios')" id="btnUsuarios" class="px-5 py-2 rounded-xl font-semibold bg-purple-600 text-white">Usuários</button>
      <button onclick="mudarAbaGestor('questoes')" id="btnQuestoes" class="px-5 py-2 rounded-xl font-semibold bg-slate-800 text-slate-400">Banco de Questões</button>
      <button onclick="mudarAbaGestor('documentos')" id="btnDocumentos" class="px-5 py-2 rounded-xl font-semibold bg-slate-800 text-slate-400">Central de Documentos</button>
    </div>

    <!-- USUÁRIOS -->
    <div id="abaUsuarios" class="space-y-6">
      <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
        <h2 class="text-xl font-bold text-purple-400">Cadastrar Novo Usuário</h2>
        <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
          <input type="text" id="usrNome" placeholder="Nome completo" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white md:col-span-2">
          <input type="text" id="usrNick" placeholder="Nick policial" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
          <input type="password" id="usrSenha" placeholder="Senha" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
          <select id="usrRole" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
            <option value="candidato">Candidato / Aluno</option>
            <option value="avaliador">Avaliador</option>
            <option value="gestor">Gestor</option>
          </select>
        </div>
        <button onclick="cadastrarUsuario()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-6 py-2.5 rounded-xl">Cadastrar</button>
      </section>

      <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
        <h2 class="text-xl font-bold text-white">Usuários Cadastrados</h2>
        <div id="listaUsuarios" class="space-y-2"></div>
      </section>
    </div>

    <!-- QUESTÕES -->
    <div id="abaQuestoes" class="hidden space-y-6">
      <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
        <h2 class="text-xl font-bold text-purple-400">Cadastrar Nova Questão</h2>
        <div class="space-y-3">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input type="text" id="questCategoria" placeholder="Categoria" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
            <input type="text" id="questTitulo" placeholder="Título" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
          </div>
          <textarea id="questEnunciado" rows="3" placeholder="Enunciado..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white"></textarea>
          <textarea id="questGabarito" rows="2" placeholder="Gabarito esperado..." class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white"></textarea>
          <button onclick="cadastrarQuestao()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-6 py-2.5 rounded-xl">Salvar Questão</button>
        </div>
      </section>

      <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
        <h2 class="text-xl font-bold text-white">Questões Cadastradas</h2>
        <div id="listaQuestoes" class="space-y-3"></div>
      </section>
    </div>

    <!-- DOCUMENTOS -->
    <div id="abaDocumentos" class="hidden space-y-6">
      <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
        <div class="flex justify-between items-center">
          <h2 class="text-xl font-bold text-purple-400">Gerenciar Documentos Oficiais</h2>
          <button onclick="inicializarDocumentos()" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg text-purple-300">Carregar Padrões RCC</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
          <input type="text" id="docTitulo" placeholder="Título do Documento" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
          <input type="url" id="docUrl" placeholder="Link Completo (https://...)" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
          <input type="text" id="docCategoria" placeholder="Categoria (ex: Penal)" class="bg-slate-800 border border-slate-700 rounded-xl p-3 text-white">
        </div>
        <button onclick="cadastrarDocumento()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-6 py-2.5 rounded-xl">Adicionar Documento</button>
      </section>

      <section class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
        <h2 class="text-xl font-bold text-white">Links Ativos</h2>
        <div id="listaDocumentosGestor" class="space-y-2"></div>
      </section>
    </div>

  </div>

  <script src="/assets/js/auth-guard.js"></script>
  <script>
    const user = checkAuth('gestor');
    document.getElementById('userNick').innerText = user.nick;
    document.getElementById('userNome').innerText = user.nome || 'Gestor';
    document.getElementById('habboAvatar').src = `https://www.habbo.com.br/habbo-imaging/avatarimage?user=${encodeURIComponent(user.nick)}&headonly=1&size=m`;
    lucide.createIcons();

    function mudarAbaGestor(aba) {
      ['Usuarios', 'Questoes', 'Documentos'].forEach(a => {
        document.getElementById('aba' + a).classList.add('hidden');
        document.getElementById('btn' + a).className = "px-5 py-2 rounded-xl font-semibold bg-slate-800 text-slate-400";
      });

      const nomeAba = aba.charAt(0).toUpperCase() + aba.slice(1);
      document.getElementById('aba' + nomeAba).classList.remove('hidden');
      document.getElementById('btn' + nomeAba).className = "px-5 py-2 rounded-xl font-semibold bg-purple-600 text-white";

      if (aba === 'usuarios') carregarUsuarios();
      if (aba === 'questoes') carregarQuestoes();
      if (aba === 'documentos') carregarDocumentosGestor();
    }

    async function carregarUsuarios() {
      const res = await fetch('/api/gestor?action=listarUsuarios');
      const data = await res.json();
      document.getElementById('listaUsuarios').innerHTML = (data.usuarios || []).map(u => `
        <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center">
          <p class="font-bold text-white">${u.nome} <span class="text-slate-400">(${u.nick_policial})</span> - <span class="text-xs text-purple-400">${u.role}</span></p>
          <button onclick="removerUsuario('${u.id}')" class="text-red-400 text-sm font-bold">Excluir</button>
        </div>
      `).join('');
    }

    async function removerUsuario(id) {
      if (!confirm('Excluir este usuário?')) return;
      await fetch('/api/gestor?action=removerUsuario', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
      carregarUsuarios();
    }

    async function carregarQuestoes() {
      const res = await fetch('/api/gestor?action=listarQuestoes');
      const data = await res.json();
      document.getElementById('listaQuestoes').innerHTML = (data.questoes || []).map(q => `
        <div class="bg-slate-800 p-4 rounded-xl space-y-2">
          <div class="flex justify-between items-start">
            <p class="font-bold text-white">[${q.categoria || 'Geral'}] ${q.enunciado}</p>
            <button onclick="excluirQuestao('${q.id}')" class="text-red-400 text-sm font-bold">Excluir</button>
          </div>
          <p class="text-emerald-400 text-xs"><strong>Gabarito:</strong> ${q.gabarito_esperado}</p>
        </div>
      `).join('');
    }

    async function excluirQuestao(id) {
      if (!confirm('Excluir esta questão?')) return;
      await fetch('/api/gestor?action=excluirQuestao', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
      carregarQuestoes();
    }

    async function inicializarDocumentos() {
      await fetch('/api/gestor?action=inicializarDocumentos');
      alert('Documentos padrão inicializados!');
      carregarDocumentosGestor();
    }

    async function cadastrarDocumento() {
      const titulo = document.getElementById('docTitulo').value.trim();
      const url = document.getElementById('docUrl').value.trim();
      const categoria = document.getElementById('docCategoria').value.trim();

      if (!titulo || !url) return alert('Informe Título e URL.');

      await fetch('/api/gestor?action=cadastrarDocumento', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titulo, url, categoria })
      });

      document.getElementById('docTitulo').value = '';
      document.getElementById('docUrl').value = '';
      document.getElementById('docCategoria').value = '';
      carregarDocumentosGestor();
    }

    async function carregarDocumentosGestor() {
      const res = await fetch('/api/gestor?action=listarDocumentos');
      const data = await res.json();
      document.getElementById('listaDocumentosGestor').innerHTML = (data.documentos || []).map(d => `
        <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center">
          <div>
            <p class="font-bold text-white text-sm">${d.titulo} <span class="text-xs text-purple-400">(${d.categoria || 'Geral'})</span></p>
            <a href="${d.url}" target="_blank" class="text-xs text-slate-400 hover:underline">${d.url}</a>
          </div>
          <button onclick="excluirDocumento('${d.id}')" class="text-red-400 text-sm font-bold">Remover</button>
        </div>
      `).join('');
    }

    async function excluirDocumento(id) {
      if (!confirm('Remover link do documento?')) return;
      await fetch('/api/gestor?action=excluirDocumento', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
      carregarDocumentosGestor();
    }

    carregarUsuarios();
  </script>
</body>
</html>
